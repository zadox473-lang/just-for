<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cyber Security Shield</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#020202;
      color:white;
      font-family:Arial, Helvetica, sans-serif;
      overflow-x:hidden;
    }

    .hero{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:40px 20px;
      position:relative;
      overflow:hidden;
    }

    /* background glow */

    .hero::before{
      content:"";
      position:absolute;
      width:700px;
      height:700px;
      background:radial-gradient(circle, rgba(255,0,0,0.18), transparent 70%);
      z-index:0;
      animation:pulse 4s infinite;
    }

    @keyframes pulse{
      0%{
        transform:scale(1);
        opacity:0.6;
      }
      50%{
        transform:scale(1.1);
        opacity:1;
      }
      100%{
        transform:scale(1);
        opacity:0.6;
      }
    }

    h1{
      font-size:60px;
      color:#ff2b2b;
      z-index:2;
      text-shadow:0 0 20px red;
    }

    p{
      margin-top:20px;
      max-width:700px;
      line-height:1.8;
      color:#cfcfcf;
      z-index:2;
      font-size:18px;
    }

    .shield-wrapper{
      width:420px;
      height:420px;
      margin-top:60px;
      position:relative;
      z-index:2;
      perspective:1000px;
    }

    /* rotating rings */

    .ring{
      position:absolute;
      border:2px solid rgba(255,0,0,0.25);
      border-radius:50%;
      inset:0;
      animation:ringRotate 15s linear infinite;
    }

    .ring2{
      inset:30px;
      animation-direction:reverse;
      animation-duration:10s;
    }

    @keyframes ringRotate{
      from{
        transform:rotateZ(0deg);
      }
      to{
        transform:rotateZ(360deg);
      }
    }

    .shield{
      width:100%;
      position:relative;
      z-index:3;
      cursor:grab;
      user-select:none;
      filter:
        drop-shadow(0 0 20px red)
        drop-shadow(0 0 40px red);
      transition:transform 0.1s linear;
    }

    .shield:active{
      cursor:grabbing;
    }

    @media(max-width:600px){
      h1{
        font-size:40px;
      }

      .shield-wrapper{
        width:300px;
        height:300px;
      }

      p{
        font-size:16px;
      }
    }

  </style>
</head>
<body>

  <section class="hero">

    <h1>CYBER SECURITY</h1>

    <p>
      Protect your systems with advanced AI-powered cyber defense.
      Real-time monitoring, threat detection, and futuristic digital protection
      for modern networks.
    </p>

    <div class="shield-wrapper">

      <div class="ring"></div>
      <div class="ring ring2"></div>

      <!-- YOUR IMAGE -->
      <img
        src="shield.png"
        class="shield"
        id="shield"
      />

    </div>

  </section>

  <script>

    const shield = document.getElementById("shield");

    let rotationY = 0;
    let velocity = 0;

    let isDragging = false;
    let lastX = 0;

    // smooth auto movement

    function animate(){

      rotationY += velocity;

      velocity *= 0.97;

      // auto rotate when idle
      if(!isDragging){
        rotationY += 0.15;
      }

      shield.style.transform = `
        rotateY(${rotationY}deg)
        rotateX(8deg)
      `;

      requestAnimationFrame(animate);
    }

    animate();

    // drag start

    shield.addEventListener("mousedown", (e)=>{
      isDragging = true;
      lastX = e.clientX;
    });

    // drag end

    window.addEventListener("mouseup", ()=>{
      isDragging = false;
    });

    // dragging movement

    window.addEventListener("mousemove", (e)=>{

      if(!isDragging) return;

      const delta = e.clientX - lastX;

      velocity = delta * 0.35;

      rotationY += velocity;

      lastX = e.clientX;
    });

    // mobile touch support

    shield.addEventListener("touchstart", (e)=>{
      isDragging = true;
      lastX = e.touches[0].clientX;
    });

    window.addEventListener("touchend", ()=>{
      isDragging = false;
    });

    window.addEventListener("touchmove", (e)=>{

      if(!isDragging) return;

      const delta = e.touches[0].clientX - lastX;

      velocity = delta * 0.35;

      rotationY += velocity;

      lastX = e.touches[0].clientX;
    });

  </script>

</body>
</html>
