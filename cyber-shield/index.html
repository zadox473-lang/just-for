<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cyber Shield</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#000;
      color:white;
      font-family:Arial, sans-serif;
      overflow:hidden;
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      text-align:center;
      position:relative;
    }

    h1{
      font-size:60px;
      color:#ff1a1a;
      text-shadow:
      0 0 10px red,
      0 0 20px red,
      0 0 40px red;
    }

    p{
      margin-top:20px;
      color:#ccc;
      font-size:18px;
      max-width:700px;
      line-height:1.7;
      padding:0 20px;
    }

    .shield-box{
      margin-top:50px;
      position:relative;
      width:350px;
      height:350px;
      margin-left:auto;
      margin-right:auto;
    }

    /* glowing ring */

    .ring{
      position:absolute;
      width:100%;
      height:100%;
      border-radius:50%;
      border:2px solid rgba(255,0,0,0.3);

      animation:spin 10s linear infinite;
    }

    .ring2{
      transform:scale(1.15);
      animation-direction:reverse;
      animation-duration:15s;
    }

    @keyframes spin{
      from{
        transform:rotate(0deg);
      }
      to{
        transform:rotate(360deg);
      }
    }

    /* shield */

    .shield{
      width:100%;
      position:relative;
      z-index:5;

      filter:
      drop-shadow(0 0 20px red)
      drop-shadow(0 0 40px red);

      cursor:grab;
      user-select:none;
    }

    .shield:active{
      cursor:grabbing;
    }

    @media(max-width:600px){

      h1{
        font-size:40px;
      }

      p{
        font-size:15px;
      }

      .shield-box{
        width:250px;
        height:250px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <h1>CYBER SECURITY</h1>

    <p>
      Advanced AI powered digital protection system with futuristic
      cyber defense technology and real-time monitoring.
    </p>

    <div class="shield-box">

      <div class="ring"></div>
      <div class="ring ring2"></div>

      <!-- IMAGE -->

      <img
        src="shield.png"
        id="shield"
        class="shield"
      >

    </div>

  </div>

  <script>

    const shield = document.getElementById("shield");

    let rotation = 0;
    let velocity = 0;

    let dragging = false;
    let lastX = 0;

    function animate(){

      rotation += velocity;

      velocity *= 0.97;

      if(!dragging){
        rotation += 0.1;
      }

      shield.style.transform =
      `rotateY(${rotation}deg)`;

      requestAnimationFrame(animate);
    }

    animate();

    // desktop

    shield.addEventListener("mousedown",(e)=>{

      dragging = true;

      lastX = e.clientX;
    });

    window.addEventListener("mouseup",()=>{

      dragging = false;
    });

    window.addEventListener("mousemove",(e)=>{

      if(!dragging) return;

      const delta = e.clientX - lastX;

      velocity = delta * 0.4;

      rotation += velocity;

      lastX = e.clientX;

    });

    // mobile

    shield.addEventListener("touchstart",(e)=>{

      dragging = true;

      lastX = e.touches[0].clientX;

    });

    window.addEventListener("touchend",()=>{

      dragging = false;

    });

    window.addEventListener("touchmove",(e)=>{

      if(!dragging) return;

      const delta =
      e.touches[0].clientX - lastX;

      velocity = delta * 0.4;

      rotation += velocity;

      lastX = e.touches[0].clientX;

    });

  </script>

</body>
</html>
